<div class="card ">
  <div class="card-header fw-bold text-center fs-5">Hard & Soft Skills</div>
  <div class="card-body">
    <div class="container">
      <div class="row">
        <div
          *ngFor="let skill of listaSkills"
          class="col-sm-6 mb-3 "
        >
          <div class="mt-2 progress " style="height: 24px; background-color: rgba(0, 0, 0, 0.07);">
            <div
              class="progress-bar progress-bar-striped progress-bar-animated "
              [class]="skill.color"
              role="progressbar"
              [style]="skill.porciento"
            >
              <span class="lh-1 text-truncate fs-6 text-start px-2 ">
                {{ skill.nombre }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
